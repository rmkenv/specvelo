name: SpecVel Backtest Validation

on:
  workflow_dispatch:
    inputs:
      include_macro:
        description: 'Include fixed income and macro (requires FRED_API_KEY secret)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
  schedule:
    - cron: '0 0 * * 0'

jobs:
  backtest:
    name: Run Validation Tests
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy scikit-learn ruptures requests -q

      - name: Run backtest
        env:
          PYTHONPATH: ${{ github.workspace }}/specvel
        run: |
          mkdir -p results
          if [ "${{ github.event.inputs.include_macro }}" == "true" ] && [ -n "${{ secrets.FRED_API_KEY }}" ]; then
            python specvel/backtest.py --fred_key "${{ secrets.FRED_API_KEY }}" --include_macro --save results/
          else
            python specvel/backtest.py --save results/
          fi

      - name: Show scorecard in summary
        if: always()
        run: |
          echo "## SpecVel Backtest Results" >> $GITHUB_STEP_SUMMARY
          echo "Run: ${{ github.run_number }} | Triggered: ${{ github.event_name }}" >> $GITHUB_STEP_SUMMARY
          for f in results/*.csv; do
            [ -f "$f" ] || continue
            echo "### $(basename $f)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            python3 -c "import pandas as pd; print(pd.read_csv('$f').to_string(index=False))" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          done

      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: backtest-results-${{ github.run_number }}
          path: results/
          retention-days: 90

      - name: Commit results (scheduled runs only)
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "backtest results $(date +'%Y-%m-%d') [skip ci]"
          git push
